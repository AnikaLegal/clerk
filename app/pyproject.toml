[tool.poetry]
name = "clerk"
version = "0.1.0"
description = ""
authors = [
    "Matt Segal <matt.segal@anikalegal.com>",
    "Luca Vari <luca.vari@anikalegal.com>"
]

[tool.poetry.dependencies]
python = "^3.10"
requests = "2.27.1"
Django = "^4"
wagtail = "2.16.1"
wagtail-localize = "^1.4"
html-sanitizer = "1.9.3"
psycopg2-binary = "^2.9.9"
gunicorn = "^21.2.0"
sentry-sdk = "^1.40.4"
django-q = "^1.3.9"
awscli = "^1.32.43"
django-webpack-loader = "1.4.1"
whitenoise = "^6.6.0"
social-auth-app-django = "5.0.0"
msal = "1.16.0"
djangorestframework = "3.13.1"
django-cors-headers = "3.11.0"
mailchimp3 = "3.0.16"
twilio = "7.5.0"
sendgrid = "^6.11.0"
beautifulsoup4 = "<=4.10"
boto3 = "^1.34.43"
django-storages = "^1.14.2"
django-cleanup = "^8.1.0"
pillow = "<10.0.0"
Pygments = "^2.17.2"
Faker = "^23.2.0"
pytest-django = "^4.8.0"
pytest-factoryboy = "^2.6.0"
responses = "^0.23"
freezegun = "^1.4.0"
openapi-spec-validator = "^0.5"
drf-openapi-tester = "^2.3.3"
django-override-storage = "^0.3.2"
chardet = "^3.0"
tzdata = "^2024.1"


[tool.poetry.dev-dependencies]
ipython = "^8.21.0"
django-extensions = "^3.2.3"
django-browser-reload = "^1.12.1"
django-debug-toolbar = "^4.3.0"
debugpy = "^1.8.1"
watchdog = {extras = ["watchmedo"], version = "^4.0.0"}


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


[tool.pytest.ini_options]
filterwarnings = [
    "ignore::UserWarning",
    "ignore::django.utils.deprecation.RemovedInDjango50Warning",
    "ignore::wagtail.utils.deprecation.RemovedInWagtail217Warning",
]
addopts = "--reuse-db --ds=clerk.settings.test"
