allOf:
  - $ref: ./IssueBase.yaml
  - type: object
    properties:
      stage:
        type: string
      outcome:
        type: string
        nullable: true
      outcome_notes:
        type: string
      provided_legal_services:
        type: boolean
      paralegal_id:
        type: number
        nullable: true
      lawyer_id:
        type: number
        nullable: true
      client_id:
        type: string
        format: uuid
      tenancy_id:
        type: number
      support_worker_id:
        type: number
        nullable: true
      employment_status:
        $ref: ./TextChoiceListField.yaml
      weekly_income:
        type: number
        nullable: true
      referrer:
        type: string
      referrer_type:
        $ref: ./TextChoiceField.yaml
      weekly_rent:
        type: integer
        nullable: true
    required:
      - client_id
      - tenancy_id
