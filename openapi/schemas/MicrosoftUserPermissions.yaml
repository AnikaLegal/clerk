type: object
properties:
  access_level:
    type: string
    enum:
      - FULL_ACCESS
      - PARTIAL_ACCESS
      - NO_ACCESS
  issues_with_access:
    type: array
    items:
      $ref: ./Issue.yaml
  issues_without_access:
    type: array
    items:
      $ref: ./Issue.yaml
required:
  - access_level
  - issues_with_access
  - issues_without_access
