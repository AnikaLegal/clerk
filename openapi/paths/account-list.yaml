get:
  operationId: getUsers
  parameters:
    - name: page
      in: query
      schema:
        type: integer
      required: false
    - name: page_size
      in: query
      schema:
        type: integer
      required: false
    - name: name
      in: query
      schema:
        type: string
      required: false
    - name: group
      in: query
      schema:
        type: string
      required: false
    - name: is_active
      in: query
      schema:
        type: boolean
      required: false
    - name: sort
      in: query
      schema:
        type: string
        enum:
          - case_capacity
          - -case_capacity
          - date_joined
          - -date_joined
          - email
          - -email
          - first_name
          - -first_name
          - last_name
          - -last_name
      required: false
  responses:
    "200":
      description: Successful response.
      content:
        application/json:
          schema:
            type: object
            properties:
              current:
                type: number
              next:
                type: number
                nullable: true
              prev:
                type: number
                nullable: true
              page_count:
                type: number
              item_count:
                type: number
              results:
                type: array
                items:
                  $ref: ../schemas/User.yaml
            required:
              - current
              - next
              - prev
              - page_count
              - item_count
              - results
post:
  operationId: createUser
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/UserCreate.yaml
  responses:
    "201":
      description: Successful response.
      content:
        application/json:
          schema:
            $ref: ../schemas/UserCreate.yaml
    "400":
      $ref: ../responses/BadRequest.yaml
    "403":
      $ref: ../responses/PermissionDenied.yaml
