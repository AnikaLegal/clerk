### Virtual Host Config

## Reverse proxy config 
server {
    # Clerk test
    listen 80;
    listen [::]:80;
    server_name test.anikalegal.org.au;
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://127.0.0.1:8001 https://test.anikalegal.org.au;
    }
    # Show maintenance pages
    error_page 502 503 =500 /maintenance.html;
    error_page 504 =500 /timeout.html;
    location = /maintenance.html {
        root /srv/infra/nginx/pages;    
        internal;
    }
    location = /timeout.html {
        root /srv/infra/nginx/pages;
        internal;
    }
}
server {
    # Clerk prod
    listen 80;
    listen [::]:80;
    server_name anikalegal.org.au;
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://127.0.0.1:8000 https://anikalegal.org.au;
    }
    # Show maintenance pages
    error_page 502 503 =500 /maintenance.html;
    error_page 504 =500 /timeout.html;
    location = /maintenance.html {
        root /srv/infra/nginx/pages;    
        internal;
    }
    location = /timeout.html {
        root /srv/infra/nginx/pages;
        internal;
    }
}

## All other requests
server {
    # 404 random requests
    listen 80 default_server;
    server_name _;
    return 404;
}
